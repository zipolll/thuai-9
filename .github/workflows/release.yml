on:
  release:
    types:
      - published

jobs:
  create-release-notes:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ github.event.release.body }}

  build-web-client:
    needs: create-release-notes
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p release
          cp -r web/. release/
          cp LICENSE release/LICENSE

      - run: |
          zip -r ../${{ github.event.repository.name }}-web.zip *
        working-directory: release

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.event.repository.name }}-web.zip

  build-server:
    needs: create-release-notes
    permissions:
      contents: write
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - linux-arm
          - linux-arm64
          - linux-x64
          - linux-musl-arm
          - linux-musl-arm64
          - linux-musl-x64
          - osx-arm64
          - osx-x64
          - win-arm64
          - win-x64
          - win-x86
        include:
          - runs-on: ubuntu-latest
          - runs-on: macos-latest
            runtime: osx-x64
          - runs-on: macos-latest
            runtime: osx-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - run: |
          dotnet publish src/thuai -c Release -o bin \
          --sc true -r ${{ matrix.runtime }} -p:AssemblyName=server \
          -p:DebugType=none \
          -p:PublishSingleFile=true
        working-directory: server

      - run: |
          mkdir -p release
          cp LICENSE release/
          cp server/README.md release/README.md
          cp -r server/bin/* release/

      - run: |
          zip -r ../${{ github.event.repository.name }}-server-${{ matrix.runtime }}.zip *
        working-directory: release

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.event.repository.name }}-server-${{ matrix.runtime }}.zip

  build-server-docker:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: get-version
        uses: frabert/replace-string-action@v2
        with:
          pattern: '^v'
          string: ${{ github.event.release.tag_name }}
          replace-with: ''

      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ghcr.io/thuasta/thuai-9-server:${{ steps.get-version.outputs.replaced }}
            ghcr.io/thuasta/thuai-9-server:latest

  pack-agent:
    needs: create-release-notes
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: cpp
            path: sdk-cpp
          - language: python
            path: sdk-python
    steps:
      - uses: actions/checkout@v4

      - run: |
          zip -r ${{ github.event.repository.name }}-agent-${{ matrix.language }}.zip ${{ matrix.path }}

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ github.event.repository.name }}-agent-${{ matrix.language }}.zip
